name: Daily Robot Discovery

on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run daily discovery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run daily-discover

      - name: Promote high-confidence robots
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run promote-robots

      - name: Check for discoveries
        id: check
        run: |
          FILE="data/daily-discoveries/$(date -u +%Y-%m-%d).json"
          if [ -f "$FILE" ]; then
            COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('./$FILE','utf8')); console.log(d.robots?.length || 0)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if discoveries found
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="discovery/daily-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "data/daily-discoveries/$DATE.json"
          git add -A "src/data/robots.json" "src/data/brands.json" "public/images/robots/" || true
          git commit -m "feat: daily robot discovery ($DATE) - ${{ steps.check.outputs.count }} robots"
          git push origin "$BRANCH"
          gh pr create \
            --title "Robot Discovery: ${{ steps.check.outputs.count }} robots ($DATE)" \
            --body "Automated daily discovery found ${{ steps.check.outputs.count }} new robot(s). Review the JSON for details." \
            --base main \
            || echo "::warning::PR creation failed. Branch '$BRANCH' was pushed — create PR manually."
