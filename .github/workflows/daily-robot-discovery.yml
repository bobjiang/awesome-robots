name: Daily Robot Discovery (Ralph Loop)

on:
  schedule:
    - cron: '7 1 * * *' # 01:07 UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  discover-robots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code for Robot Discovery
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            You are running the daily Ralph Loop robot discovery task.

            ## Instructions

            ### Step 1: Research Sources
            Read the data sources file at content/sources/awesome-robotics-digest-sources.csv for reference.
            Search the web for the latest humanoid and quadruped robot announcements from high-quality sources:
            - IEEE Spectrum Robotics, The Robot Report, Robotics & Automation News
            - TechCrunch, Interesting Engineering, MIT News
            - Manufacturer official websites and press releases
            Focus on robots announced or launched in the last 7 days.

            ### Step 2: Identify New Robots
            Read src/data/robots.json to get ALL existing robot IDs.
            Compare your research findings against the existing database.
            Only proceed with robots that are genuinely NEW (not already in the database).
            Each robot must have enough public information for a complete entry.

            ### Step 3: Add New Robots
            For each new robot found:
            - Follow the exact structure in src/data/robots.json (match an existing entry)
            - Follow the RobotDetailTemplate at src/components/RobotDetailTemplate.tsx for required detail fields
            - Include: generalInfo, keyFeatures (minimum 12), hardwareBuildQuality, softwareEcosystem, supplierReliability
            - Add the brand to src/data/brands.json if it's a new brand
            - Use placeholder image paths like "/images/robots/[brand]-[model]/[brand]-[model]-1.jpg"
            - Set lastVerifiedAt to today's date

            ### Step 4: Validate and Submit
            - Run: npm ci && npm run lint
            - If no new robots were found, exit with a message "No new robots discovered today"
            - If new robots were added, create a feature branch and PR:
              - Branch: daily-robots/YYYY-MM-DD
              - PR title: "Robot Discovery: N robots (YYYY-MM-DD)"
              - PR body: list each robot with name, brand, category, and one-line description

            ## Rules
            - Never add duplicates — always check existing IDs first
            - Only add robots with sufficient public specifications
            - Do not modify existing robot entries
            - Do not add robots that are just concepts/renders with no real specs
