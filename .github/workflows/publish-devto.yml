name: Publish to Dev.to

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**/*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/blog/**/*.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$NEW_FILES" ]; then
            echo "No new blog posts detected."
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "New blog posts detected:"
            echo "$NEW_FILES"
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_new == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_new == 'true'
        run: npm ci

      - name: Publish to Dev.to
        if: steps.detect.outputs.has_new == 'true'
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        run: |
          echo "${{ steps.detect.outputs.files }}" | while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Publishing: $file"
              npx tsx scripts/publish-blog.ts file "$file"
              echo "---"
            fi
          done
